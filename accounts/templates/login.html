{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #0d6efd;
            --primary-soft: rgba(13, 110, 253, .15);
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, .12), transparent 35%),
                radial-gradient(circle at bottom right, rgba(111, 66, 193, .12), transparent 35%),
                #f8fafc;
        }

        [data-bs-theme="dark"] body {
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, .15), transparent 35%),
                radial-gradient(circle at bottom right, rgba(111, 66, 193, .15), transparent 35%),
                #0f172a;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            padding: 2.5rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, .72);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .08), inset 0 1px 0 rgba(255, 255, 255, .6);
            animation: fadeIn .5s ease;
        }

        [data-bs-theme="dark"] .login-card {
            background: rgba(15, 23, 42, .82);
            border: 1px solid rgba(255, 255, 255, .05);
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            margin: auto;
            border-radius: 20px;
            background: linear-gradient(135deg, #0d6efd, #6f42c1);

            display: flex;
            align-items: center;
            justify-content: center;

            color: white;
            font-size: 2rem;
            margin-bottom: 18px;
        }

        .brand-title {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            color: #6c757d;
            font-size: .95rem;
            margin-bottom: 28px;
        }

        [data-bs-theme="dark"] .brand-subtitle {
            color: #cbd5e1;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control {
            height: 52px;
            border-radius: 14px;
            border: 1px solid #dee2e6;
            transition: .25s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 .25rem var(--primary-soft);
        }

        .btn-login {
            height: 54px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            transition: .3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow:0 12px 30px rgba(37, 99, 235, .3);
        }

        .footer-brand {
            text-align: center;
            padding: 18px;
            font-size: .9rem;
            color: #6c757d;
        }

        .footer-brand strong {
            color: var(--primary);
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 1.5rem;
                border-radius: 22px;
            }
            .brand-title {
                font-size: 1.6rem;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            } to {
                opacity: 1;
                transform: none;
            }
        }

        .input-group-text {
            height: 52px;
            border-radius: 14px 0 0 14px;
            background: none;
            border-right: none;
        }

        .form-control {
            height: 52px;
            border-left: none;
            border-radius: 0 14px 14px 0;
        }

        .form-control:focus {
            box-shadow: none;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 .25rem rgba(13, 110, 253, .15);
            border-radius: 14px;
        }
    </style>
</head>

<body>
    <main class="page-wrapper">
        <div class="login-card">
            <div class="text-center">
                <div class="brand-icon">
                    <i class="bi bi-house"></i>
                </div>
                <h1 class="brand-title">Login</h1>
                <p class="brand-subtitle">
                    Acesse sua conta para continuar
                </p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                {% for field in form %}{% if field.errors %}{{ field.errors }}{% endif %}{% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">
                        E-mail
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="text" name="username" class="form-control form-control-sm" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Senha
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" id="senha" name="password" class="form-control form-control-sm" placeholder="Digite sua senha" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                            <i id="eye" class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me">
                        <label class="form-check-label" for="remember_me">
                            Lembrar-me
                        </label>
                    </div>
                    <!-- <a href="#" class="small text-decoration-none">
                        Esqueci minha senha
                    </a> -->
                </div>
                <div class="d-grid">
                    <button class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-brand">
        © 2026 <strong>Site</strong> • Desenvolvido por <strong>
            <a href="https://wa.me/557981711788" target="_blank" style="text-decoration: none; color: inherit;">
                Carlos Junior
            </a>
        </strong>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        document.documentElement.setAttribute(
            'data-bs-theme',
            prefersDark ? 'dark' : 'light'
        );

        function togglePassword() {
            const input = document.getElementById("senha");
            const eye = document.getElementById("eye");
            if (input.type === "password") {

                input.type = "text";

                eye.className = "bi bi-eye-slash";

            }
            else {
                input.type = "password";
                eye.className = "bi bi-eye";
            }
        }
    </script>


</body>

</html>
